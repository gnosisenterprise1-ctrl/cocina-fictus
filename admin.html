<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Cocina Fictus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg: #04060b; --surface: #0f1420; --accent: #c5a059; --text: #e2e8f0; --muted: #94a3b8;
      --success: #25D366; --warning: #f1c40f; --danger: #e74c3c;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    aside { width: 280px; background: var(--surface); border-right: 1px solid rgba(255,255,255,0.03); padding: 40px; display: flex; flex-direction: column; }
    .logo { color: var(--accent); font-weight: 700; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 60px; }
    nav { flex: 1; }
    nav a { display: block; padding: 12px 0; color: var(--muted); text-decoration: none; transition: 0.3s; font-size: 0.95rem; cursor: pointer; }
    nav a.active, nav a:hover { color: var(--accent); font-weight: 600; }

    main { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #04060b 0%, #0a0e1a 100%); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    h1 { font-size: 2rem; color: #fff; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--surface); padding: 25px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
    .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

    .orders-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .order-card { background: var(--surface); border-radius: 2px; padding: 25px; border: 1px solid rgba(255,255,255,0.03); position: relative; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .status-badge { position: absolute; top: 25px; right: 25px; padding: 5px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; }
    .status-recibido { background: rgba(231, 76, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }
    .status-preparando { background: rgba(241, 196, 15, 0.1); color: var(--warning); border: 1px solid var(--warning); }
    .status-listo { background: rgba(37, 211, 102, 0.1); color: var(--success); border: 1px solid var(--success); }

    .order-id { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
    .order-items { margin: 15px 0; font-size: 0.9rem; }
    .order-total { font-size: 1.2rem; font-weight: 800; color: #fff; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }

    .btn-group { display: flex; gap: 15px; margin-top: 25px; }
    .action-btn { flex: 1; padding: 12px; border-radius: 0; border: none; font-weight: 600; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
    .btn-prep { background: none; border: 1px solid var(--warning); color: var(--warning); }
    .btn-done { background: none; border: 1px solid var(--success); color: var(--success); }
    .btn-delete { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); }
    .action-btn:hover { background: rgba(255,255,255,0.05); }

    .financial-view { display: none; }
    .manual-order-form { background: var(--surface); padding: 30px; border-radius: 20px; margin-top: 40px; }
    input { background: none; border: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 5px; color: #fff; border-radius: 0; margin-right: 20px; outline: none; transition: 0.3s; width: 250px; }
    input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<aside>
  <div class="logo">COFICIUS ADMIN</div>
  <nav>
    <a href="#" class="active" onclick="showView('orders')">Ordenes en Vivo</a>
    <a href="#" onclick="showView('manual')">Pedido Manual</a>
    <a href="#" onclick="exportToCSV()">Exportar Ventas (CSV)</a>
  </nav>
  <div style="font-size: 0.7rem; color: var(--muted);">Mérida, Yucatán · Merida Local</div>
</aside>

<main>
  <div id="orders-view">
    <div class="header">
      <h1>Órdenes de Cocina</h1>
      <button onclick="refreshOrders()" class="action-btn" style="width:auto; padding: 10px 20px; background: rgba(197, 160, 89, 0.1); color: var(--accent); border: 1px solid var(--accent);">🔄 Refrescar</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Ventas Hoy</div>
        <div class="stat-val" id="totalDaily">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pedidos Activos</div>
        <div class="stat-val" id="activeOrders">0</div>
      </div>
    </div>

    <div class="orders-container" id="ordersList"></div>
  </div>

  <div id="manual-view" class="financial-view">
    <div class="header"><h1>Registrar Pedido Externo</h1></div>
    <div class="manual-order-form">
      <p style="margin-bottom: 20px; color: var(--muted);">Usa este formulario para pedidos de salón o llamadas telefónicas.</p>
      <input type="text" id="manualName" placeholder="Concepto (Ej. Relleno Negro x2)">
      <input type="number" id="manualTotal" placeholder="Monto Total $">
      <button class="action-btn btn-done" onclick="saveManualOrder()" style="width:auto; padding: 12px 30px;">Registrar Venta</button>
    </div>
  </div>
</main>

<audio id="bell" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div style="position:fixed; bottom:20px; right:20px; background:rgba(255,255,255,0.05); padding:10px 20px; border-radius:100px; display:flex; align-items:center; gap:10px; font-size:0.75rem; border: 1px solid rgba(255,255,255,0.1);">
  <div style="width:8px; height:8px; background:var(--success); border-radius:50%; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite;"></div>
  <span>SISTEMA CONECTADO · TIEMPO REAL</span>
</div>

<style>
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>

<script>
  let orders = [];

  // CONFIGURACIÓN DE FIREBASE (Mismo que en index.html)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Escuchar órdenes en tiempo real
  db.ref('orders').on('value', (snapshot) => {
    const data = snapshot.val();
    const remoteOrders = data ? Object.values(data) : [];
    
    // Alerta sonora si hay un pedido nuevo
    if (remoteOrders.length > orders.length && orders.length > 0) {
      document.getElementById('bell').play();
    }
    
    orders = remoteOrders;
    renderAll();
  });

  function refreshOrders() {
    // Ya no es necesario el refresh manual constante con Firebase, 
    // pero mantenemos la función para compatibilidad local si se desea.
    renderAll();
  }

  function renderAll() {
    renderOrders();
    updateStats();
  }

  function updateStats() {
    let total = 0;
    orders.forEach(o => total += o.total);
    const dailyElem = document.getElementById('totalDaily');
    if (dailyElem) dailyElem.innerText = `$${total.toFixed(2)}`;
  }

  function renderOrders() {
    const list = document.getElementById('ordersList');
    if (!list) return;
    list.innerHTML = '';
    
    const active = orders.filter(o => o.status !== 'Entregado' && o.status !== 'Eliminado');
    const activeCountElem = document.getElementById('activeOrders');
    if (activeCountElem) activeCountElem.innerText = active.length;

    active.reverse().forEach(o => {
      const itemsHtml = o.items.map(i => `<div>${i.qty}x ${i.name}</div>`).join('');
      const statusClass = 'status-' + o.status.toLowerCase();
      
      list.innerHTML += `
        <div class="order-card">
          <span class="status-badge ${statusClass}">${o.status}</span>
          <div class="order-id">ID: ${o.id} • ${o.source}</div>
          <div style="font-size: 0.8rem; color: var(--muted);">${new Date(o.timestamp).toLocaleTimeString()}</div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">$${o.total.toFixed(2)}</div>
          <div class="btn-group">
            ${o.status === 'Recibido' ? `<button class="action-btn btn-prep" onclick="updateStatus('${o.id}', 'Preparando')">Cocinando</button>` : ''}
            <button class="action-btn btn-done" onclick="updateStatus('${o.id}', 'Entregado')">Finalizar</button>
            <button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')">Eliminar</button>
          </div>
        </div>
      `;
    });
  }

  function exportToCSV() {
    if (orders.length === 0) return alert('No hay ventas para exportar');
    
    let csv = 'ID,Fecha,Origen,Monto,Estado\n';
    orders.forEach(o => {
      csv += `${o.id},${new Date(o.timestamp).toLocaleDateString()},${o.source},${o.total},${o.status}\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Ventas_Cocina_Fictus.csv';
    a.click();
  }

  function updateStatus(id, newStatus) {
    db.ref('orders/' + id).update({ status: newStatus });
  }

  function deleteOrder(id) {
    if(confirm('¿Seguro que quieres eliminar este pedido?')) {
      db.ref('orders/' + id).remove();
    }
  }

  function saveManualOrder() {
    const name = document.getElementById('manualName').value;
    const total = parseFloat(document.getElementById('manualTotal').value);
    
    if(!name || !total) return alert('Completa los campos');

    const order = {
      id: 'MAN-' + Date.now().toString().slice(-6),
      items: [{name, qty: 1, price: total}],
      total: total,
      status: 'Entregado',
      timestamp: new Date().toISOString(),
      source: 'Manual'
    };

    // Sincronización con Firebase
    db.ref('orders/' + order.id).set(order);
    
    alert('Venta registrada!');
    document.getElementById('manualName').value = '';
    document.getElementById('manualTotal').value = '';
  }

  function save() {
    localStorage.setItem('fictus_orders', JSON.stringify(orders));
    renderAll();
  }

  function showView(view) {
    const ordersView = document.getElementById('orders-view');
    const manualView = document.getElementById('manual-view');
    if (ordersView) ordersView.style.display = view === 'orders' ? 'block' : 'none';
    if (manualView) manualView.style.display = view === 'manual' ? 'block' : 'none';
    
    document.querySelectorAll('aside nav a').forEach(a => a.classList.remove('active'));
    // Find link by text since simple onclick match can be brittle
    const navLinks = Array.from(document.querySelectorAll('aside nav a'));
    navLinks.forEach(a => {
        if (a.getAttribute('onclick').includes(view)) a.classList.add('active');
    });
  }

  setInterval(refreshOrders, 5000);
  refreshOrders();
</script>

</body>
</html>
